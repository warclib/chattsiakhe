<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e222d;
      --border: #2a2f3d;
      --accent: #5b6af5;
      --accent2: #a78bfa;
      --text: #e8eaf0;
      --muted: #6b7280;
      --bubble-me: #5b6af5;
      --bubble-other: #1e222d;
      --online: #34d399;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform .3s ease;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .search-bar {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .search-bar input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      outline: none;
      transition: border-color .2s;
    }

    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--muted); }

    .contacts {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .contacts::-webkit-scrollbar { width: 4px; }
    .contacts::-webkit-scrollbar-track { background: transparent; }
    .contacts::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .contact {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background .15s;
      position: relative;
    }

    .contact:hover { background: var(--surface2); }
    .contact.active { background: rgba(91, 106, 245, .12); }
    .contact.active::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }

    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      flex-shrink: 0;
      position: relative;
    }

    .avatar.has-status::after {
      content: '';
      position: absolute; bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      background: var(--online);
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-weight: 500; font-size: .9rem; }
    .contact-last { font-size: .78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    .contact-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .contact-time { font-size: .72rem; color: var(--muted); }
    .badge {
      background: var(--accent);
      color: #fff;
      border-radius: 99px;
      font-size: .68rem;
      font-weight: 600;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chat-header .info { flex: 1; }
    .chat-header .name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
    .chat-header .status { font-size: .78rem; color: var(--online); }

    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: grid; place-items: center;
      cursor: pointer;
      color: var(--muted);
      transition: color .2s, background .2s;
      font-size: 16px;
    }
    .icon-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .date-divider {
      text-align: center;
      font-size: .72rem;
      color: var(--muted);
      margin: 14px 0 8px;
      position: relative;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%; width: calc(50% - 60px);
      height: 1px;
      background: var(--border);
    }
    .date-divider::before { left: 0; }
    .date-divider::after { right: 0; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp .25s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.me { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: grid; place-items: center;
      font-size: .7rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
    }

    .bubble {
      max-width: 60%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: .88rem;
      line-height: 1.5;
      position: relative;
      word-break: break-word;
    }

    .me .bubble {
      background: var(--bubble-me);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .other .bubble {
      background: var(--bubble-other);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble-time {
      font-size: .65rem;
      opacity: .6;
      margin-top: 4px;
      display: block;
      text-align: right;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bubble-other);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── INPUT ── */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .input-wrap {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: flex-end;
      padding: 8px 14px;
      transition: border-color .2s;
      gap: 8px;
    }

    .input-wrap:focus-within { border-color: var(--accent); }

    .input-wrap textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    .input-wrap textarea::placeholder { color: var(--muted); }

    .attach-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 2px;
      transition: color .2s;
      align-self: flex-end;
      margin-bottom: 2px;
    }
    .attach-btn:hover { color: var(--accent2); }

    .send-btn {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 14px;
      display: grid; place-items: center;
      cursor: pointer;
      font-size: 18px;
      transition: transform .15s, box-shadow .15s;
      flex-shrink: 0;
    }

    .send-btn:hover { transform: scale(1.06); box-shadow: 0 4px 20px rgba(91,106,245,.5); }
    .send-btn:active { transform: scale(.96); }

    /* ── EMPTY STATE ── */
    .empty-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
    }

    .empty-icon { font-size: 4rem; opacity: .3; }
    .empty-chat p { font-family: 'Syne', sans-serif; font-weight: 600; }

    /* ── MOBILE TOGGLE ── */
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
    }

    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 9;
    }

    @media (max-width: 680px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0;
        z-index: 10;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
      .overlay.show { display: block; }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">💬</div>
    <h1>ChatApp</h1>
  </div>
  <div class="search-bar">
    <input type="text" placeholder="Buscar conversación…" oninput="filterContacts(this.value)" />
  </div>
  <div class="contacts" id="contacts"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="chat-header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div class="avatar" id="headerAvatar" style="background:#2a2f3d; width:38px; height:38px;"></div>
    <div class="info">
      <div class="name" id="headerName">Selecciona un chat</div>
      <div class="status" id="headerStatus"></div>
    </div>
    <div class="header-actions">
      <div class="icon-btn" title="Llamada">📞</div>
      <div class="icon-btn" title="Video">🎥</div>
      <div class="icon-btn" title="Info">ℹ️</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-chat" id="emptyState">
      <div class="empty-icon">💬</div>
      <p>Selecciona una conversación</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <button class="attach-btn" title="Adjuntar">📎</button>
      <textarea id="msgInput" rows="1" placeholder="Escribe un mensaje…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" onclick="sendMessage()" title="Enviar">➤</button>
  </div>
</div>

<script>
/* ──────────────────────────────────────────────
   DATA
────────────────────────────────────────────── */
const palette = [
  ['#5b6af5','#fff'], ['#a78bfa','#fff'], ['#34d399','#0d0f14'],
  ['#f59e0b','#0d0f14'], ['#ec4899','#fff'], ['#06b6d4','#0d0f14']
];

const contacts = [
  { id: 1, name: 'María García',   initials: 'MG', online: true,  unread: 3, last: 'Ya llego!',          color: 0 },
  { id: 2, name: 'Carlos Pérez',   initials: 'CP', online: true,  unread: 0, last: 'Perfecto, gracias',   color: 1 },
  { id: 3, name: 'Ana Rodríguez',  initials: 'AR', online: false, unread: 1, last: 'Nos vemos mañana',    color: 2 },
  { id: 4, name: 'Luis Torres',    initials: 'LT', online: true,  unread: 0, last: 'Sí, cuenta conmigo',  color: 3 },
  { id: 5, name: 'Grupo Trabajo',  initials: 'GT', online: false, unread: 7, last: 'Sofía: Revisen el doc', color: 4 },
];

const history = {
  1: [
    { from: 'other', text: '¡Hola! ¿Cómo estás?',            time: '10:22' },
    { from: 'me',    text: 'Muy bien, ¿y tú?',               time: '10:23' },
    { from: 'other', text: 'Todo bien por acá 😄 ¿Salimos hoy?', time: '10:24' },
    { from: 'me',    text: 'Claro, dime a qué hora',          time: '10:25' },
    { from: 'other', text: 'Ya llego!',                       time: '10:40' },
  ],
  2: [
    { from: 'me',    text: 'Carlos, ¿puedes revisar el informe?', time: '09:00' },
    { from: 'other', text: 'Claro, lo veo ahora',             time: '09:05' },
    { from: 'other', text: 'Perfecto, gracias',               time: '09:30' },
  ],
  3: [
    { from: 'other', text: '¿Confirmas la reunión de mañana?', time: 'Ayer' },
    { from: 'me',    text: 'Sí, confirmado ✅',                time: 'Ayer' },
    { from: 'other', text: 'Nos vemos mañana',                 time: 'Ayer' },
  ],
  4: [
    { from: 'other', text: '¿Participas en el proyecto?',      time: 'Lun' },
    { from: 'me',    text: 'Sí, cuenta conmigo',               time: 'Lun' },
  ],
  5: [
    { from: 'other', text: 'Sofía: Revisen el doc antes del viernes', time: '08:00' },
    { from: 'other', text: 'Pedro: ¿Cuál doc?',               time: '08:02' },
    { from: 'other', text: 'Sofía: El de presupuesto',        time: '08:03' },
    { from: 'me',    text: 'Ya lo vi, tiene errores en la tabla 3', time: '08:10' },
  ],
};

let activeId = null;
const myInitials = 'YO';

/* ──────────────────────────────────────────────
   RENDER CONTACTS
────────────────────────────────────────────── */
function renderContacts(list) {
  const container = document.getElementById('contacts');
  container.innerHTML = '';
  list.forEach(c => {
    const [bg, fg] = palette[c.color];
    const div = document.createElement('div');
    div.className = 'contact' + (c.id === activeId ? ' active' : '');
    div.dataset.id = c.id;
    div.innerHTML = `
      <div class="avatar ${c.online ? 'has-status' : ''}" style="background:${bg}; color:${fg}">${c.initials}</div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-last">${c.last}</div>
      </div>
      <div class="contact-meta">
        <span class="contact-time">${c.id <= 2 ? 'Ahora' : c.id === 3 ? 'Ayer' : 'Lun'}</span>
        ${c.unread ? `<span class="badge">${c.unread}</span>` : ''}
      </div>`;
    div.onclick = () => openChat(c.id);
    container.appendChild(div);
  });
}

function filterContacts(q) {
  const filtered = contacts.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
  renderContacts(filtered);
}

/* ──────────────────────────────────────────────
   OPEN CHAT
────────────────────────────────────────────── */
function openChat(id) {
  activeId = id;
  const c = contacts.find(x => x.id === id);
  c.unread = 0;
  renderContacts(contacts);

  // header
  const [bg, fg] = palette[c.color];
  document.getElementById('headerAvatar').style.cssText = `background:${bg}; color:${fg}; width:38px; height:38px; border-radius:50%; display:grid; place-items:center; font-family:'Syne',sans-serif; font-weight:700; font-size:.8rem;`;
  document.getElementById('headerAvatar').textContent = c.initials;
  document.getElementById('headerName').textContent = c.name;
  document.getElementById('headerStatus').textContent = c.online ? '● En línea' : 'Desconectado';
  document.getElementById('headerStatus').style.color = c.online ? 'var(--online)' : 'var(--muted)';

  // messages
  const box = document.getElementById('messages');
  box.innerHTML = '<div class="date-divider">Hoy</div>';
  (history[id] || []).forEach(m => appendBubble(m.from, m.text, m.time, false));
  scrollBottom();

  // close sidebar on mobile
  if (window.innerWidth <= 680) toggleSidebar(false);
}

/* ──────────────────────────────────────────────
   MESSAGES
────────────────────────────────────────────── */
function appendBubble(from, text, time, animate = true) {
  const c = contacts.find(x => x.id === activeId);
  const [bg, fg] = palette[c ? c.color : 0];

  const row = document.createElement('div');
  row.className = `msg-row ${from}`;
  if (!animate) row.style.animation = 'none', row.style.opacity = '1';

  const avatarHTML = from === 'me'
    ? `<div class="msg-avatar" style="background:var(--accent2); color:#fff">${myInitials}</div>`
    : `<div class="msg-avatar" style="background:${bg}; color:${fg}">${c ? c.initials : '?'}</div>`;

  row.innerHTML = `
    ${avatarHTML}
    <div class="bubble">
      ${escapeHTML(text)}
      <span class="bubble-time">${time}</span>
    </div>`;
  document.getElementById('messages').appendChild(row);
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activeId) return;

  input.value = '';
  input.style.height = 'auto';

  const now = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  appendBubble('me', text, time);
  scrollBottom();

  // update contact last message
  const c = contacts.find(x => x.id === activeId);
  if (c) c.last = text;
  renderContacts(contacts);

  // fake reply
  setTimeout(() => showTyping(), 800);
  setTimeout(() => {
    removeTyping();
    const replies = [
      '¡Entendido! 👍', 'Ok, perfecto.', '¡Gracias por avisar!',
      'Sí, tiene sentido.', 'Claro que sí 😊', 'Lo reviso ahora.',
      '¿Puedes darme más detalles?', '¡Excelente idea!', 'De acuerdo.'
    ];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    appendBubble('other', reply, time);
    if (c) c.last = reply;
    renderContacts(contacts);
    scrollBottom();
  }, 2200);
}

function showTyping() {
  const box = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row other';
  row.id = 'typing';
  const c = contacts.find(x => x.id === activeId);
  const [bg, fg] = palette[c ? c.color : 0];
  row.innerHTML = `
    <div class="msg-avatar" style="background:${bg}; color:${fg}">${c ? c.initials : '?'}</div>
    <div class="typing-indicator">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  box.appendChild(row);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollBottom() {
  const box = document.getElementById('messages');
  requestAnimationFrame(() => { box.scrollTop = box.scrollHeight; });
}

function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

/* ──────────────────────────────────────────────
   MOBILE SIDEBAR
────────────────────────────────────────────── */
function toggleSidebar(force) {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  const isOpen = sb.classList.contains('open');
  const open = force !== undefined ? force : !isOpen;
  sb.classList.toggle('open', open);
  ov.classList.toggle('show', open);
}

/* ──────────────────────────────────────────────
   INIT
────────────────────────────────────────────── */
renderContacts(contacts);
</script>
</body>
</html>
