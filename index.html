<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0d12;
      --surface: #13161e;
      --surface2: #1a1e29;
      --border: #252a38;
      --accent: #6366f1;
      --accent2: #818cf8;
      --accent3: #a5b4fc;
      --text: #e2e4f0;
      --muted: #5c6480;
      --online: #22d3a5;
      --danger: #f43f5e;
      --bme-from: #6366f1;
      --bme-to: #8b5cf6;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ════ AUTH ════ */
    #authScreen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }

    .auth-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }

    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: .16;
      animation: drift 9s ease-in-out infinite alternate;
    }
    .orb1 { width: 520px; height: 520px; background: #6366f1; top: -180px; left: -120px; }
    .orb2 { width: 420px; height: 420px; background: #8b5cf6; bottom: -120px; right: -80px; animation-delay: 3s; }
    .orb3 { width: 320px; height: 320px; background: #06b6d4; top: 45%; left: 45%; animation-delay: 6s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(35px, 25px) scale(1.08); }
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      width: 100%; max-width: 420px;
      padding: 38px 34px;
      position: relative;
      box-shadow: 0 32px 80px rgba(0,0,0,.65);
      animation: cardIn .4s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; }

    .auth-logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--bme-to));
      border-radius: 14px; display: grid; place-items: center;
      font-size: 22px;
      box-shadow: 0 8px 24px rgba(99,102,241,.4);
    }

    .auth-logo h1 {
      font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .auth-tabs {
      display: flex; gap: 4px;
      background: var(--surface2); border-radius: 12px; padding: 4px;
      margin-bottom: 26px;
    }

    .auth-tab {
      flex: 1; padding: 9px; border: none; border-radius: 9px;
      background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: .87rem; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    .auth-tab.active { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(99,102,241,.4); }

    .auth-form { display: flex; flex-direction: column; gap: 13px; }

    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-group label {
      font-size: .74rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em;
    }

    .field-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); font-size: 15px; pointer-events: none;
    }

    .auth-form input {
      width: 100%;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 11px; padding: 11px 13px 11px 40px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .88rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .auth-form input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.14); }
    .auth-form input::placeholder { color: var(--muted); }

    .av-picker { display: flex; flex-direction: column; gap: 8px; }
    .av-picker label { font-size: .74rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
    .av-opts { display: flex; gap: 7px; flex-wrap: wrap; }

    .av-opt {
      width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; border: 2.5px solid transparent;
      display: grid; place-items: center; font-size: 17px;
      transition: transform .15s, border-color .15s;
    }
    .av-opt:hover { transform: scale(1.1); }
    .av-opt.selected { border-color: #fff; transform: scale(1.14); }

    .auth-btn {
      margin-top: 4px; padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--bme-to));
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700;
      cursor: pointer; letter-spacing: .03em;
      box-shadow: 0 6px 20px rgba(99,102,241,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(99,102,241,.5); }
    .auth-btn:active { transform: translateY(1px); }

    .auth-error {
      background: rgba(244,63,94,.1); border: 1px solid rgba(244,63,94,.28);
      border-radius: 10px; padding: 9px 13px;
      font-size: .82rem; color: #fb7185; display: none;
    }
    .auth-error.show { display: block; }

    /* ════ APP ════ */
    #app { display: none; flex: 1; overflow: hidden; }
    #app.visible { display: flex; }

    /* Sidebar */
    .sidebar {
      width: 288px; min-width: 288px;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: transform .3s ease;
    }

    .sb-header { padding: 16px 16px 13px; border-bottom: 1px solid var(--border); }

    .sb-top { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; }

    .logo-mark {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--bme-to));
      border-radius: 9px; display: grid; place-items: center; font-size: 15px;
    }

    .sb-top h1 {
      font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800; flex: 1;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .logout-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 17px; padding: 4px; transition: color .2s; border-radius: 7px;
    }
    .logout-btn:hover { color: var(--danger); }

    .me-card {
      display: flex; align-items: center; gap: 9px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 11px; padding: 8px 11px;
    }
    .me-name { font-size: .84rem; font-weight: 500; }
    .me-tag { font-size: .7rem; color: var(--online); }

    .search-wrap { padding: 11px 15px; border-bottom: 1px solid var(--border); }
    .search-wrap input {
      width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 7px 13px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .83rem;
      outline: none; transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    .sec-label {
      padding: 11px 15px 5px; font-size: .69rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
    }

    .contacts { flex: 1; overflow-y: auto; padding-bottom: 6px; }
    .contacts::-webkit-scrollbar { width: 4px; }
    .contacts::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .contact {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 15px; cursor: pointer; transition: background .14s; position: relative;
    }
    .contact:hover { background: var(--surface2); }
    .contact.active { background: rgba(99,102,241,.1); }
    .contact.active::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent); border-radius: 0 3px 3px 0;
    }

    .avatar {
      border-radius: 50%; display: grid; place-items: center;
      font-family: 'Syne', sans-serif; font-weight: 700; flex-shrink: 0;
    }

    .c-info { flex: 1; min-width: 0; }
    .c-name { font-size: .87rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .c-last { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    .c-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .c-time { font-size: .69rem; color: var(--muted); }
    .badge { background: var(--accent); color: #fff; border-radius: 99px; font-size: .65rem; font-weight: 700; padding: 2px 7px; }

    .add-btn {
      margin: 9px 14px;
      padding: 9px; background: var(--surface2);
      border: 1.5px dashed var(--border); border-radius: 11px;
      color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: .83rem;
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .add-btn:hover { border-color: var(--accent); color: var(--accent2); }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .chat-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 18px; display: flex; align-items: center; gap: 11px;
    }

    .h-info { flex: 1; }
    .h-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .93rem; }
    .h-status { font-size: .74rem; color: var(--muted); margin-top: 1px; }

    .h-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 33px; height: 33px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 9px;
      display: grid; place-items: center; cursor: pointer;
      color: var(--muted); transition: all .2s; font-size: 14px;
    }
    .icon-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .messages {
      flex: 1; overflow-y: auto;
      padding: 18px 20px; display: flex; flex-direction: column; gap: 4px;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .date-sep {
      text-align: center; font-size: .69rem; color: var(--muted);
      margin: 12px 0 7px; position: relative;
    }
    .date-sep::before, .date-sep::after {
      content: ''; position: absolute; top: 50%; height: 1px;
      background: var(--border); width: calc(50% - 54px);
    }
    .date-sep::before { left: 0; }
    .date-sep::after { right: 0; }

    .msg-row {
      display: flex; align-items: flex-end; gap: 6px;
      animation: msgIn .22s ease forwards; opacity: 0;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.me { flex-direction: row-reverse; }

    .msg-av {
      width: 25px; height: 25px; border-radius: 50%;
      display: grid; place-items: center;
      font-size: .62rem; font-family: 'Syne', sans-serif; font-weight: 700; flex-shrink: 0;
    }

    .bubble {
      max-width: 62%; padding: 9px 13px; border-radius: 17px;
      font-size: .86rem; line-height: 1.55; word-break: break-word;
    }

    .me .bubble {
      background: linear-gradient(135deg, var(--bme-from), var(--bme-to));
      color: #fff; border-bottom-right-radius: 4px;
    }
    .other .bubble {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-bottom-left-radius: 4px;
    }

    .b-time { font-size: .62rem; opacity: .58; margin-top: 3px; display: block; text-align: right; }

    .input-area {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 12px 16px; display: flex; align-items: flex-end; gap: 8px;
    }

    .input-box {
      flex: 1; background: var(--surface2);
      border: 1.5px solid var(--border); border-radius: 15px;
      display: flex; align-items: flex-end; padding: 7px 12px;
      transition: border-color .2s;
    }
    .input-box:focus-within { border-color: var(--accent); }

    .input-box textarea {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: .87rem; resize: none; max-height: 110px; line-height: 1.5;
    }
    .input-box textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--bme-to));
      border: none; border-radius: 11px;
      display: grid; place-items: center; cursor: pointer; font-size: 16px;
      transition: transform .15s, box-shadow .15s; flex-shrink: 0;
    }
    .send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 22px rgba(99,102,241,.5); }
    .send-btn:active { transform: scale(.95); }

    .empty-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 11px; color: var(--muted);
    }
    .empty-icon { font-size: 3.2rem; opacity: .22; }
    .empty-chat p { font-family: 'Syne', sans-serif; font-weight: 600; font-size: .88rem; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.72);
      display: none; align-items: center; justify-content: center;
      z-index: 200; padding: 20px;
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 26px;
      width: 100%; max-width: 370px;
      animation: cardIn .3s ease forwards;
    }

    .modal h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; margin-bottom: 16px; }

    .modal input {
      width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 13px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .87rem;
      outline: none; margin-bottom: 11px; transition: border-color .2s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal input::placeholder { color: var(--muted); }

    .modal-actions { display: flex; gap: 8px; margin-top: 4px; }

    .modal-btn {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: .87rem; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    .modal-btn.primary { background: var(--accent); color: #fff; }
    .modal-btn.primary:hover { background: var(--accent2); }
    .modal-btn.secondary { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .modal-btn.secondary:hover { color: var(--text); }

    .users-list { max-height: 210px; overflow-y: auto; margin-top: 2px; }
    .user-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 9px; border-radius: 9px; cursor: pointer; transition: background .14s;
    }
    .user-item:hover { background: var(--surface2); }
    .u-name { font-size: .86rem; font-weight: 500; }
    .u-user { font-size: .74rem; color: var(--muted); }

    .menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 19px; cursor: pointer; }
    .mob-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 9; }
    .mob-overlay.show { display: block; }

    @media (max-width: 680px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>

<!-- ══ PANTALLA AUTH ══ -->
<div id="authScreen">
  <div class="auth-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <h1>ChatApp</h1>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="switchTab('register')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="auth-form">
        <div class="auth-error" id="loginError"></div>
        <div class="field-group">
          <label>Usuario</label>
          <div class="field-wrap">
            <span class="field-icon">👤</span>
            <input id="loginUser" type="text" placeholder="tu_usuario" autocomplete="username" />
          </div>
        </div>
        <div class="field-group">
          <label>Contraseña</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password"
              onkeydown="if(event.key==='Enter') doLogin()" />
          </div>
        </div>
        <button class="auth-btn" onclick="doLogin()">Entrar →</button>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none">
      <div class="auth-form">
        <div class="auth-error" id="regError"></div>
        <div class="field-group">
          <label>Nombre completo</label>
          <div class="field-wrap">
            <span class="field-icon">✏️</span>
            <input id="regName" type="text" placeholder="María García" />
          </div>
        </div>
        <div class="field-group">
          <label>Nombre de usuario</label>
          <div class="field-wrap">
            <span class="field-icon">@</span>
            <input id="regUser" type="text" placeholder="maria_g (sin espacios)" />
          </div>
        </div>
        <div class="field-group">
          <label>Contraseña</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input id="regPass" type="password" placeholder="Mínimo 4 caracteres" />
          </div>
        </div>
        <div class="av-picker">
          <label>Color de avatar</label>
          <div class="av-opts" id="avOpts"></div>
        </div>
        <button class="auth-btn" onclick="doRegister()">Crear cuenta →</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="mob-overlay" id="mobOverlay" onclick="toggleSidebar(false)"></div>

  <div class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-top">
        <div class="logo-mark">💬</div>
        <h1>ChatApp</h1>
        <button class="logout-btn" title="Cerrar sesión" onclick="doLogout()">⏻</button>
      </div>
      <div class="me-card">
        <div class="avatar" id="meAv" style="width:36px;height:36px;font-size:.8rem;"></div>
        <div>
          <div class="me-name" id="meName"></div>
          <div class="me-tag">● En línea</div>
        </div>
      </div>
    </div>

    <div class="search-wrap">
      <input type="text" placeholder="Buscar conversación…" oninput="filterContacts(this.value)" />
    </div>

    <div class="sec-label">Conversaciones</div>
    <div class="contacts" id="contactList"></div>

    <button class="add-btn" onclick="openModal()">＋ Agregar contacto</button>
  </div>

  <div class="main">
    <div class="chat-header">
      <button class="menu-toggle" onclick="toggleSidebar(true)">☰</button>
      <div class="avatar" id="hAv" style="width:33px;height:33px;font-size:.76rem;background:#252a38;"></div>
      <div class="h-info">
        <div class="h-name" id="hName">Selecciona un chat</div>
        <div class="h-status" id="hStatus"></div>
      </div>
      <div class="h-actions">
        <div class="icon-btn" title="Llamada">📞</div>
        <div class="icon-btn" title="Video">🎥</div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-chat" id="emptyState">
        <div class="empty-icon">💬</div>
        <p>Selecciona o agrega un contacto</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="msgInput" rows="1" placeholder="Escribe un mensaje…"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<!-- Modal agregar contacto -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>➕ Agregar contacto</h2>
    <input id="searchInput" type="text" placeholder="Buscar por usuario o nombre…" oninput="searchUsers(this.value)" />
    <div class="users-list" id="userResults">
      <div style="padding:12px;text-align:center;color:var(--muted);font-size:.81rem;">Escribe para buscar usuarios registrados</div>
    </div>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="modal-btn secondary" onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
/* ══ DB HELPERS ══ */
const DB = {
  users:    ()    => JSON.parse(localStorage.getItem('ca_users')   || '{}'),
  setUsers: (v)   => localStorage.setItem('ca_users', JSON.stringify(v)),
  chats:    ()    => JSON.parse(localStorage.getItem('ca_chats')   || '{}'),
  setChats: (v)   => localStorage.setItem('ca_chats', JSON.stringify(v)),
  contacts: (uid) => JSON.parse(localStorage.getItem('ca_c_'+uid) || '[]'),
  setContacts:(uid,v)=> localStorage.setItem('ca_c_'+uid, JSON.stringify(v)),
  session:  ()    => localStorage.getItem('ca_session'),
  setSession:(v)  => localStorage.setItem('ca_session', v),
  clearSess:()    => localStorage.removeItem('ca_session'),
};

/* ══ PALETTES ══ */
const COLORS = [
  {bg:'#6366f1',fg:'#fff'}, {bg:'#8b5cf6',fg:'#fff'}, {bg:'#ec4899',fg:'#fff'},
  {bg:'#f59e0b',fg:'#000'}, {bg:'#22d3a5',fg:'#000'}, {bg:'#06b6d4',fg:'#000'},
  {bg:'#f97316',fg:'#fff'}, {bg:'#84cc16',fg:'#000'},
];
const EMOJIS = ['🐱','🦊','🐸','🦁','🐧','🦋','🐺','🦄'];

let selColor = 0;

/* Build avatar picker */
const avOpts = document.getElementById('avOpts');
COLORS.forEach((c,i) => {
  const el = document.createElement('div');
  el.className = 'av-opt' + (i===0 ? ' selected' : '');
  el.style.cssText = `background:${c.bg};color:${c.fg}`;
  el.textContent = EMOJIS[i];
  el.onclick = () => {
    document.querySelectorAll('.av-opt').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
    selColor = i;
  };
  avOpts.appendChild(el);
});

/* ══ AUTH TABS ══ */
function switchTab(t) {
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0) === (t==='login')));
  document.getElementById('loginForm').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = t==='register' ? '' : 'none';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=> el.classList.remove('show'), 3500);
}

/* ══ LOGIN ══ */
function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  if (!u || !p) return showErr('loginError', 'Completa todos los campos.');
  const users = DB.users();
  if (!users[u]) return showErr('loginError', 'Usuario no encontrado.');
  if (users[u].password !== btoa(p)) return showErr('loginError', 'Contraseña incorrecta.');
  DB.setSession(u);
  launchApp(users[u]);
}

/* ══ REGISTER ══ */
function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const user = document.getElementById('regUser').value.trim().toLowerCase().replace(/\s/g,'_');
  const pass = document.getElementById('regPass').value;
  if (!name || !user || !pass) return showErr('regError', 'Completa todos los campos.');
  if (user.length < 3) return showErr('regError', 'Usuario: mínimo 3 caracteres.');
  if (pass.length < 4) return showErr('regError', 'Contraseña: mínimo 4 caracteres.');
  if (!/^[a-z0-9_]+$/.test(user)) return showErr('regError', 'Usuario: solo letras, números y _');
  const users = DB.users();
  if (users[user]) return showErr('regError', 'Ese usuario ya existe.');
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const nu = { username:user, name, initials, password:btoa(pass), colorIdx:selColor, createdAt:Date.now() };
  users[user] = nu;
  DB.setUsers(users);
  DB.setSession(user);
  launchApp(nu);
}

/* ══ LOGOUT ══ */
function doLogout() {
  DB.clearSess();
  currentUser = null; activeUid = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

/* ══ APP STATE ══ */
let currentUser = null;
let activeUid = null;

function launchApp(user) {
  currentUser = user;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  const c = COLORS[user.colorIdx||0];
  setAvStyle(document.getElementById('meAv'), c, user.initials, 36);
  document.getElementById('meName').textContent = user.name;
  renderContacts();
}

/* ══ CONTACTS ══ */
function renderContacts(list) {
  if (!list) list = DB.contacts(currentUser.username);
  const box = document.getElementById('contactList');
  box.innerHTML = '';
  if (!list.length) {
    box.innerHTML = `<div style="padding:18px;text-align:center;color:var(--muted);font-size:.8rem;">Sin contactos.<br>Agrega uno abajo ↓</div>`;
    return;
  }
  const users = DB.users();
  const chats = DB.chats();
  list.forEach(uid => {
    const u = users[uid]; if (!u) return;
    const key = cKey(currentUser.username, uid);
    const msgs = chats[key] || [];
    const last = msgs[msgs.length-1];
    const unread = msgs.filter(m => m.from!==currentUser.username && !m.read).length;
    const c = COLORS[u.colorIdx||0];
    const div = document.createElement('div');
    div.className = 'contact'+(uid===activeUid?' active':'');
    div.innerHTML = `
      <div class="avatar" style="background:${c.bg};color:${c.fg};width:39px;height:39px;font-size:.82rem;">${u.initials}</div>
      <div class="c-info">
        <div class="c-name">${esc(u.name)}</div>
        <div class="c-last">${last?esc(last.text.slice(0,38)):'Sin mensajes'}</div>
      </div>
      <div class="c-meta">
        <span class="c-time">${last?fmtT(last.ts):''}</span>
        ${unread?`<span class="badge">${unread}</span>`:''}
      </div>`;
    div.onclick = () => openChat(uid);
    box.appendChild(div);
  });
}

function filterContacts(q) {
  const uids = DB.contacts(currentUser.username);
  const users = DB.users();
  renderContacts(uids.filter(uid => {
    const u = users[uid];
    return u && (u.name.toLowerCase().includes(q.toLowerCase()) || u.username.includes(q.toLowerCase()));
  }));
}

/* ══ ADD CONTACT MODAL ══ */
function openModal() {
  document.getElementById('addModal').classList.add('show');
  document.getElementById('searchInput').value = '';
  document.getElementById('userResults').innerHTML = `<div style="padding:12px;text-align:center;color:var(--muted);font-size:.81rem;">Escribe para buscar usuarios registrados</div>`;
  setTimeout(()=>document.getElementById('searchInput').focus(),100);
}

function closeModal() {
  document.getElementById('addModal').classList.remove('show');
}

function searchUsers(q) {
  const box = document.getElementById('userResults');
  box.innerHTML = '';
  if (!q.trim()) { box.innerHTML = `<div style="padding:12px;text-align:center;color:var(--muted);font-size:.81rem;">Escribe para buscar</div>`; return; }
  const users = DB.users();
  const myC = DB.contacts(currentUser.username);
  const res = Object.values(users).filter(u =>
    u.username !== currentUser.username && !myC.includes(u.username) &&
    (u.name.toLowerCase().includes(q.toLowerCase()) || u.username.includes(q.toLowerCase()))
  );
  if (!res.length) { box.innerHTML = `<div style="padding:14px;text-align:center;color:var(--muted);font-size:.81rem;">No se encontraron usuarios.</div>`; return; }
  res.forEach(u => {
    const c = COLORS[u.colorIdx||0];
    const div = document.createElement('div');
    div.className = 'user-item';
    div.innerHTML = `
      <div class="avatar" style="background:${c.bg};color:${c.fg};width:34px;height:34px;font-size:.73rem;">${u.initials}</div>
      <div>
        <div class="u-name">${esc(u.name)}</div>
        <div class="u-user">@${esc(u.username)}</div>
      </div>`;
    div.onclick = () => addContact(u.username);
    box.appendChild(div);
  });
}

function addContact(uid) {
  const list = DB.contacts(currentUser.username);
  if (!list.includes(uid)) { list.unshift(uid); DB.setContacts(currentUser.username, list); }
  closeModal();
  renderContacts();
  openChat(uid);
}

/* ══ OPEN CHAT ══ */
function openChat(uid) {
  activeUid = uid;
  const users = DB.users(); const u = users[uid]; if (!u) return;

  // mark read
  const chats = DB.chats(); const key = cKey(currentUser.username, uid);
  if (chats[key]) { chats[key].forEach(m => { if(m.from!==currentUser.username) m.read=true; }); DB.setChats(chats); }

  renderContacts();

  const c = COLORS[u.colorIdx||0];
  setAvStyle(document.getElementById('hAv'), c, u.initials, 33);
  document.getElementById('hName').textContent = u.name;
  document.getElementById('hStatus').textContent = '@'+u.username;

  const box = document.getElementById('messages');
  box.innerHTML = '<div class="date-sep">Hoy</div>';
  (chats[key]||[]).forEach(m => renderBubble(m, false));
  scrollBot();

  if (window.innerWidth<=680) toggleSidebar(false);
}

/* ══ RENDER BUBBLE ══ */
function renderBubble(m, animate=true) {
  const isMe = m.from === currentUser.username;
  const u = DB.users()[m.from]; if (!u) return;
  const c = COLORS[u.colorIdx||0];
  const row = document.createElement('div');
  row.className = `msg-row ${isMe?'me':'other'}`;
  if (!animate) { row.style.animation='none'; row.style.opacity='1'; }
  row.innerHTML = `
    <div class="msg-av" style="background:${c.bg};color:${c.fg}">${u.initials}</div>
    <div class="bubble">${esc(m.text).replace(/\n/g,'<br>')}
      <span class="b-time">${fmtT(m.ts)}</span>
    </div>`;
  document.getElementById('messages').appendChild(row);
}

/* ══ SEND ══ */
function sendMsg() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text || !activeUid) return;
  inp.value = ''; inp.style.height = 'auto';

  const key = cKey(currentUser.username, activeUid);
  const chats = DB.chats();
  if (!chats[key]) chats[key] = [];
  const msg = { from: currentUser.username, text, ts: Date.now(), read: false };
  chats[key].push(msg);
  DB.setChats(chats);

  renderBubble(msg, true);
  scrollBot();
  renderContacts();
}

function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
function scrollBot() { const b=document.getElementById('messages'); requestAnimationFrame(()=>{b.scrollTop=b.scrollHeight;}); }

/* ══ UTILS ══ */
function cKey(a,b) { return [a,b].sort().join('__'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtT(ts) {
  const d=new Date(ts), n=new Date();
  if(d.toDateString()===n.toDateString()) return d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('es',{day:'numeric',month:'short'});
}
function setAvStyle(el,c,initials,size) {
  el.style.cssText=`background:${c.bg};color:${c.fg};width:${size}px;height:${size}px;border-radius:50%;display:grid;place-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:${size*.24}rem;`;
  el.textContent=initials;
}

function toggleSidebar(open) {
  const sb=document.getElementById('sidebar'), ov=document.getElementById('mobOverlay');
  const isOpen = typeof open==='boolean' ? open : !sb.classList.contains('open');
  sb.classList.toggle('open',isOpen); ov.classList.toggle('show',isOpen);
}

/* ══ INIT ══ */
(function(){
  const sess = DB.session();
  if (sess) { const u=DB.users()[sess]; if(u){ launchApp(u); return; } }
  document.getElementById('authScreen').style.display='flex';
})();
</script>
</body>
</html>
